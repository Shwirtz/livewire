name: Publish Scheduled Posts

on:
  schedule:
    # Runs every day at 8:00 AM UTC (10am Israel time)
    - cron: '0 8 * * *'
  workflow_dispatch:  # also allows manual trigger from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run publish scheduler
        id: scheduler
        run: python scripts/publish_scheduler.py

      - name: Commit and push if posts were published
        run: |
          git config user.name "LiveWire Scheduler"
          git config user.email "scheduler@livewire.sparkmode.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Auto-publish: scheduled posts going live [skip ci]"
            git push
            echo "Published posts — Vercel will auto-deploy"
          else
            echo "No posts due for publishing today"
          fi
